UnitRegistry:
  filename: chip_units.txt
  autoconvert_to_preferred: False
  auto_reduce_dimensions: True
  autoconvert_offset_to_baseunit: False
  cache_folder: ":auto:"
mpl_formatter: "~P"
formatter:
  default_format: "~P"
Matplotlib: True
set_application_registry: True
default_preferred_units:
  - volt
  - ampere
  - ohm
  - hertz
  - micron
  - farad
  - henry
  - kelvin
  - dimensionless