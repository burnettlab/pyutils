UnitRegistry:
  filename: chip_units.txt
  autoconvert_to_preferred: True
  auto_reduce_dimensions: True
  autoconvert_offset_to_baseunit: True
  cache_folder: ":auto:"
formatter:
  default_format: ".3f~#P"
Matplotlib: True
set_application_registry: True
default_preferred_units:
  - volt
  - ampere
  - ohm
  - hertz
  - micron
  - farad
  - henry
  - kelvin
  - dimensionless